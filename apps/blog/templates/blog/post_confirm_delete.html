{% extends "base.html" %}

{% block title %}Supprimer un post{% endblock title %}

{% block content %}
<h2>Supprimer le post</h2>

<p>Es-tu sûr de vouloir supprimer :</p>

<!-- apercu du post a supprimer -->
<article>
    <h3>{{ post.title }}</h3>
    <p>{{ post.content|truncatechars:150 }}</p>
</article>

<form method="post">
    {% csrf_token %}
    <button type="submit">Oui, supprimer</button>
    <a href="{% url 'post_detail' post.id %}">Annuler</a>
</form>

{% endblock content %}
