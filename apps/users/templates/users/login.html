{% extends "base.html" %}

{% block title %}Connexion{% endblock title %}

{% block content %}
<h2>Connexion</h2>

<!-- formulaire de login -->
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Se connecter</button>
</form>

<p>Pas de compte ? <a href="{% url 'register' %}">Inscrivez-vous</a></p>
{% endblock content %}
